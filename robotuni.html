<!DOCTYPE html>
<html>
<head>
<title>Robot Unicorn Attack</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ Ruffle from CDN -->
<script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle"></script>

<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
</style>
</head>

<body>

<div id="game" style="width: 800px; height: 600px;"></div>

<script>
  window.RufflePlayer = window.RufflePlayer || {};

  window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    player.style.width = "100%";
    player.style.height = "100%";

    document.getElementById("game").appendChild(player);

    // 🔑 YOUR GAME FILE FROM jsDelivr
    player.load("https://cdn.jsdelivr.net/gh/rainS-IM/BpLhostig@main/robotunicornattack/unicorn.jocke.no/unicorn-v1.swf");
  });
</script>

</body>
</html>
