<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Youtubers Life</title>
    <style>
      body {
        background: #0f0f0f;
        color: #fff;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #unity-container {
        width: 100%;
        height: 100%;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }

      #unity-canvas {
        width: 100%;
        height: 100%;
        background: #000;
        cursor: default;
      }

      #loading-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0f0f0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        transition: opacity 0.5s;
      }

      .loader-content {
        width: 300px;
        text-align: center;
      }

      .progress-container {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        margin-top: 20px;
        overflow: hidden;
        position: relative;
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #ff4b2b, #ff416c);
        border-radius: 10px;
        transition: width 0.2s ease-out;
      }

      .status-text {
        font-size: 14px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .percentage {
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 4px;
        background: linear-gradient(135deg, #fff 0%, #aaa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      #fullscreen-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        z-index: 20;
        backdrop-filter: blur(10px);
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #fullscreen-btn:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.05);
      }

      #fullscreen-btn svg {
        width: 20px;
        height: 20px;
      }
    </style>
  </head>

  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="loading-screen">
        <div class="loader-content">
          <div id="status" class="status-text">Initializing</div>
          <div id="percentage" class="percentage">0%</div>
          <div class="progress-container">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>
      </div>
      <button id="fullscreen-btn" title="Toggle Fullscreen">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
          ></path>
        </svg>
      </button>
    </div>
    <script>
      const baseUrl =
        "https://cdn.jsdelivr.net/gh/reeyuki/ytlifeomg@main/Build/";
      const dataChunks = [
        "youtuberslifeport-reeyuki.data00",

        "youtuberslifeport-reeyuki.data20",
        "youtuberslifeport-reeyuki.data21",

        "youtuberslifeport-reeyuki.data31",
        "youtuberslifeport-reeyuki.data32",
        "youtuberslifeport-reeyuki.data33",
        "youtuberslifeport-reeyuki.data34",
        "youtuberslifeport-reeyuki.data35",

        "youtuberslifeport-reeyuki.data60",
        "youtuberslifeport-reeyuki.data61",
        "youtuberslifeport-reeyuki.data62",
      ];
      const wasmChunks = [
        "youtuberslifeport-reeyuki.wasm00",
        "youtuberslifeport-reeyuki.wasm01",
        "youtuberslifeport-reeyuki.wasm02",
        "youtuberslifeport-reeyuki.wasm03",
        "youtuberslifeport-reeyuki.wasm04",
      ];
      const loaderUrl = baseUrl + "youtuberslifeport-reeyuki.loader.js";
      const frameworkUrl = baseUrl + "youtuberslifeport-reeyuki.framework.js";
      const canvas = document.querySelector("#unity-canvas");
      const status = document.querySelector("#status");
      const percentage = document.querySelector("#percentage");
      const progressFill = document.querySelector("#progress-fill");
      const loadingScreen = document.querySelector("#loading-screen");
      const fsBtn = document.querySelector("#fullscreen-btn");

      async function loadChunks(list, name, onProgress) {
        const blobs = new Array(list.length);
        await Promise.all(
          list.map(async (file, i) => {
            const res = await fetch(baseUrl + file);
            blobs[i] = await res.blob();
            onProgress(name, i);
          }),
        );
        return new Blob(blobs);
      }

      async function init() {
        const total = dataChunks.length + wasmChunks.length;
        const done = { Assets: 0, Engine: 0 };

        function onProgress(name, i) {
          done[name] = i + 1;
          const totalDone = done.Assets + done.Engine;
          const p = Math.round((totalDone / total) * 100);
          const listLen =
            name === "Assets" ? dataChunks.length : wasmChunks.length;
          status.textContent = `Loading ${name} (${done[name]}/${listLen})`;
          percentage.textContent = p + "%";
          progressFill.style.width = p + "%";
        }

        const [dataBlob, wasmBlob] = await Promise.all([
          loadChunks(dataChunks, "Assets", onProgress),
          loadChunks(wasmChunks, "Engine", onProgress),
        ]);

        const dataUrl = URL.createObjectURL(dataBlob);
        const wasmUrl = URL.createObjectURL(wasmBlob);
        const config = {
          dataUrl: dataUrl,
          frameworkUrl: frameworkUrl,
          codeUrl: wasmUrl,
          streamingAssetsUrl: "StreamingAssets",
          companyName: "U-Play online",
          productName: "Youtubers Life",
          productVersion: "1.6.3e",
        };
        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (p) => {
            status.textContent = "Launching";
            percentage.textContent = Math.round(p * 100) + "%";
            progressFill.style.width = p * 100 + "%";
          }).then((instance) => {
            loadingScreen.style.opacity = "0";
            setTimeout(() => loadingScreen.remove(), 500);
            fsBtn.onclick = () => instance.SetFullscreen(1);
          });
        };
        document.body.appendChild(script);
      }
      init();
    </script>
  </body>
</html>
