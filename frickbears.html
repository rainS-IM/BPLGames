<!DOCTYPE html>

        <style>
            html, body {
                width: 100% !important;
                height: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                border: 0 !important;
                background: #0d0d0d !important;
                color: #cccccc !important;
                overflow: hidden !important;
            }

            div.gm4html5_div_class {
                margin: 0 !important;
                padding: 0 !important;
                border: 0 !important;
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                width: 100vw !important;
                height: 100vh !important;
                background: #0d0d0d !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
            }

            canvas {
                image-rendering: optimizeSpeed !important;
                image-rendering: pixelated !important;
                -webkit-interpolation-mode: nearest-neighbor !important;
                -ms-touch-action: none !important;
                touch-action: none !important;
                margin: 0 !important;
                padding: 0 !important;
                border: 0 !important;
                display: block !important;
            }

            :-webkit-full-screen {
                width: 100% !important;
                height: 100% !important;
            }

            div.gm4html5_login {
                padding: 20px;
                position: absolute;
                border: solid 2px #000000;
                background-color: #404040;
                color: #00ff00;
                border-radius: 15px;
                box-shadow: #101010 20px 20px 40px;
            }

            div.gm4html5_cancel_button {
                float: right;
            }

            div.gm4html5_login_button {
                float: left;
            }

            div.gm4html5_login_header {
                text-align: center;
            }

            #fullscreen-btn {
                position: fixed;
                top: 12px;
                right: 12px;
                z-index: 9999;
                background: rgba(20, 20, 20, 0.85);
                border: 1px solid rgba(255, 255, 255, 0.15);
                color: #ccc;
                width: 36px;
                height: 36px;
                border-radius: 6px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.2s, color 0.2s, border-color 0.2s;
                backdrop-filter: blur(4px);
                padding: 0;
            }

            #fullscreen-btn:hover {
                background: rgba(50, 50, 50, 0.95);
                color: #fff;
                border-color: rgba(255, 255, 255, 0.35);
            }

            #fullscreen-btn svg {
                width: 16px;
                height: 16px;
                fill: currentColor;
                flex-shrink: 0;
            }

            #port-credit {
                position: fixed;
                bottom: 10px;
                right: 12px;
                z-index: 9999;
                font-family: monospace;
                font-size: 11px;
                color: rgba(160, 160, 160, 0.7);
                pointer-events: none;
                transition: opacity 1s ease;
                opacity: 1;
                user-select: none;
            }

            #port-credit.hidden {
                opacity: 0;
            }
        </style>
    </head>

    <body>
        <button id="fullscreen-btn" title="Fullscreen" aria-label="Toggle fullscreen">
            <svg id="fs-icon-expand" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/>
            </svg>
            <svg id="fs-icon-compress" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none;">
                <path d="M9 3H7v4H3v2h6V3zm6 0h-2v6h6V7h-4V3zM3 13v2h4v4h2v-6H3zm14 6v-4h4v-2h-6v6h2z"/>
            </svg>
        </button>

        <div id="port-credit">port by reeyuki</div>

        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas id="canvas" width="640" height="360">
                <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>

        <script type="text/javascript" src="html5game/Frickbears3.yyp..js?cachebust=158694397"></script>

        <script>window.onload = GameMaker_Init;</script>

        <script>
            (function () {
                var btn = document.getElementById('fullscreen-btn');
                var expandIcon = document.getElementById('fs-icon-expand');
                var compressIcon = document.getElementById('fs-icon-compress');
                var gameDiv = document.getElementById('gm4html5_div_id');
                var canvas = document.getElementById('canvas');

                var baseWidth = canvas.width;
                var baseHeight = canvas.height;
                var mouseEventsPatched = false;

                function isFullscreen() {
                    return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
                }

                function updateIcon() {
                    if (isFullscreen()) {
                        expandIcon.style.display = 'none';
                        compressIcon.style.display = '';
                    } else {
                        expandIcon.style.display = '';
                        compressIcon.style.display = 'none';
                    }
                }

                function syncCanvasSize() {
                    if (isFullscreen()) {
                        var availW = window.innerWidth;
                        var availH = window.innerHeight;
                        var scaleX = availW / baseWidth;
                        var scaleY = availH / baseHeight;
                        var scale = Math.min(scaleX, scaleY);
                        var displayW = Math.floor(baseWidth * scale);
                        var displayH = Math.floor(baseHeight * scale);
                        canvas.style.setProperty('width', displayW + 'px', 'important');
                        canvas.style.setProperty('height', displayH + 'px', 'important');
                    } else {
                        canvas.style.removeProperty('width');
                        canvas.style.removeProperty('height');
                    }
                }

                function patchMouseEvents() {
                    if (mouseEventsPatched) return;
                    mouseEventsPatched = true;
                    ['mousemove', 'mousedown', 'mouseup', 'click'].forEach(function (type) {
                        document.addEventListener(type, function (e) {
                            if (e._remapped) return;
                            if (!isFullscreen()) return;
                            var rect = canvas.getBoundingClientRect();
                            var scaleX = baseWidth / rect.width;
                            var scaleY = baseHeight / rect.height;
                            var remapped = new MouseEvent(e.type, {
                                bubbles: e.bubbles,
                                cancelable: e.cancelable,
                                view: e.view,
                                button: e.button,
                                buttons: e.buttons,
                                clientX: rect.left + (e.clientX - rect.left) * scaleX,
                                clientY: rect.top + (e.clientY - rect.top) * scaleY,
                                screenX: e.screenX,
                                screenY: e.screenY,
                                movementX: e.movementX * scaleX,
                                movementY: e.movementY * scaleY,
                                ctrlKey: e.ctrlKey,
                                shiftKey: e.shiftKey,
                                altKey: e.altKey,
                                metaKey: e.metaKey
                            });
                            remapped._remapped = true;
                            e.stopImmediatePropagation();
                            e.preventDefault();
                            canvas.dispatchEvent(remapped);
                        }, true);
                    });
                }

                btn.addEventListener('click', function () {
                    if (isFullscreen()) {
                        (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen).call(document);
                    } else {
                        var el = gameDiv;
                        (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
                        setTimeout(function () { canvas.focus(); }, 100);
                    }
                });

                ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange'].forEach(function (evt) {
                    document.addEventListener(evt, function () {
                        updateIcon();
                        requestAnimationFrame(function () {
                            syncCanvasSize();
                            if (isFullscreen()) patchMouseEvents();
                        });
                    });
                });

                new MutationObserver(function (mutations) {
                    mutations.forEach(function (m) {
                        if (m.attributeName === 'width' || m.attributeName === 'height' || m.attributeName === 'style') {
                            gameDiv.style.setProperty('background', '#0d0d0d', 'important');
                            if (m.attributeName === 'width' || m.attributeName === 'height') {
                                baseWidth = canvas.width;
                                baseHeight = canvas.height;
                                if (isFullscreen()) syncCanvasSize();
                            }
                        }
                    });
                }).observe(canvas, { attributes: true, attributeFilter: ['width', 'height', 'style'] });

                window.addEventListener('resize', function () {
                    if (isFullscreen()) syncCanvasSize();
                });

                var credit = document.getElementById('port-credit');
                setTimeout(function () {
                    credit.classList.add('hidden');
                    setTimeout(function () { if (credit.parentNode) credit.parentNode.removeChild(credit); }, 1000);
                }, 30000);
            })();
        </script>
    </body>
</html>
